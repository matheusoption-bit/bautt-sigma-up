name: "Blue Team Defense Pipeline"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  COVERAGE_THRESHOLD: 85

jobs:

  schema-validation:
    name: "Schema & Contract Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install packages (editable)
        run: |
          pip install -e services/atlas-engine
          pip install -e services/delta-engine
          pip install -e services/atlas-api
      - name: Validate Pydantic schemas
        run: python scripts/ci/validate_schemas.py
      - name: Check contract compliance
        run: python scripts/ci/check_contracts.py

  fuzz-testing:
    name: "Fuzz Testing - Grok Attack Vectors (30 cases)"
    runs-on: ubuntu-latest
    needs: schema-validation
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install packages
        run: |
          pip install pytest pytest-cov hypothesis
          pip install -e services/atlas-engine
          pip install -e services/delta-engine
          pip install -e services/atlas-api
      - name: Run Grok Fuzz Pack (30 data-driven cases)
        run: pytest services/atlas-api/tests/security/test_grok_fuzz_pack.py -v --tb=short
      - name: Run Hypothesis property tests
        run: |
          pytest services/atlas-api/tests/security/test_hypothesis_fuzzing.py \
            --hypothesis-show-statistics -v

  unit-tests-coverage:
    name: "Unit Tests (85% Coverage Gate)"
    runs-on: ubuntu-latest
    needs: schema-validation
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install packages
        run: |
          pip install pytest pytest-cov hypothesis
          pip install -e services/atlas-engine
          pip install -e services/delta-engine
          pip install -e services/atlas-api
      - name: Run atlas-engine tests with coverage
        run: |
          pytest services/atlas-engine/tests/ \
            --cov=atlas_engine \
            --cov-report=xml:coverage-atlas-engine.xml \
            --cov-report=term \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -v
      - name: Run atlas-api tests with coverage
        run: |
          pytest services/atlas-api/tests/ \
            --cov=atlas_api \
            --cov-report=xml:coverage-atlas-api.xml \
            --cov-report=term \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -v
      - name: Run delta-engine tests
        run: |
          pytest services/delta-engine/tests/ -v
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-*.xml
          if-no-files-found: warn

  ruleset-audit:
    name: "Ruleset Audit & Conflict Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install packages
        run: |
          pip install -e services/atlas-engine
          pip install -e services/delta-engine
      - name: Validate fingerprint
        run: python scripts/ci/validate_fingerprint.py services/atlas-engine/config/atlas_ruleset_v0.2.json
      - name: Detect rule conflicts
        run: python scripts/ci/detect_rule_conflicts.py services/atlas-engine/config/atlas_ruleset_v0.2.json
      - name: Check contract compliance
        run: python scripts/ci/check_contracts.py

  security-scan:
    name: "Security & Vulnerability Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit security linter
        run: |
          bandit -r services/ scripts/ -f json -o bandit-report.json \
            --severity-level medium --exit-zero
      - name: Check for high-severity issues
        run: |
          python -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          if high:
              for r in high:
                  print(f\"HIGH: {r['filename']}:{r['line_number']} - {r['issue_text']}\")
              sys.exit(1)
          print(f'No HIGH severity issues. Total issues: {len(data.get(\"results\", []))}')
          "
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: bandit-report.json
          if-no-files-found: warn

  rate-limit-tests:
    name: "Rate Limiting Tests"
    runs-on: ubuntu-latest
    needs: [unit-tests-coverage, fuzz-testing]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install packages
        run: |
          pip install pytest
          pip install -e services/atlas-engine
          pip install -e services/delta-engine
          pip install -e services/atlas-api
      - name: Run rate limiting tests
        run: pytest services/atlas-api/tests/security/test_rate_limiting.py -v

  integration-tests:
    name: "ATLAS + DELTA Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests-coverage
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install packages
        run: |
          pip install pytest
          pip install -e services/atlas-engine
          pip install -e services/delta-engine
          pip install -e services/atlas-api
      - name: Run integration tests
        run: pytest services/atlas-engine/tests/integration/ -v --tb=short

  deploy-gate:
    name: "Deploy Gate - All Checks Must Pass"
    runs-on: ubuntu-latest
    needs:
      - schema-validation
      - fuzz-testing
      - unit-tests-coverage
      - ruleset-audit
      - security-scan
      - rate-limit-tests
      - integration-tests
    steps:
      - name: All defense layers passed
        run: |
          echo "Blue Team Defense Pipeline - All gates passed"
          echo "=============================================="
          echo "- Schema validation        OK"
          echo "- Fuzz testing (30 cases)  OK"
          echo "- Unit tests (85% cov)     OK"
          echo "- Ruleset audit            OK"
          echo "- Security scan            OK"
          echo "- Rate limiting tests      OK"
          echo "- Integration tests        OK"
